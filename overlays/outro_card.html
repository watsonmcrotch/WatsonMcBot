<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WatsonOS Outro Card</title>
  <link rel="stylesheet" href="./assets/css/watsonos.css">
  <style>
    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #000;
      -webkit-font-smoothing: none;
    }

    .card-container {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Scanline overlay */
    .card-container::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
    }

    /* Logo blocks — static, muted */
    .logo-blocks {
      display: flex;
      gap: 6px;
      margin-bottom: 40px;
      transform: scale(2.5);
      opacity: 0;
      animation: w95-fadeIn 1s ease 0.5s forwards;
    }
    .logo-blocks div {
      width: 18px;
      height: 18px;
    }
    .logo-blocks div:nth-child(1) { background: #4a1a52; }
    .logo-blocks div:nth-child(2) { background: #1a7a6e; }
    .logo-blocks div:nth-child(3) { background: #4a1a52; }
    .logo-blocks div:nth-child(4) { background: #1a7a6e; }

    .title-text {
      font-family: var(--tf);
      font-size: 36px;
      color: #555;
      letter-spacing: 6px;
      opacity: 0;
      animation: w95-fadeIn 1s ease 1s forwards;
    }

    .subtitle-text {
      font-family: var(--tf);
      font-size: 16px;
      color: #333;
      letter-spacing: 4px;
      margin-top: 10px;
      opacity: 0;
      animation: w95-fadeIn 1s ease 1.5s forwards;
    }

    .thanks-text {
      font-family: var(--tf);
      font-size: 20px;
      color: #2ec4b6;
      text-shadow: 0 0 10px rgba(46,196,182,0.3);
      margin-top: 40px;
      opacity: 0;
      animation: w95-fadeIn 1s ease 2s forwards;
      letter-spacing: 3px;
    }

    /* Subtle power-off cursor */
    .cursor-blink {
      display: inline-block;
      width: 12px;
      height: 18px;
      background: #333;
      animation: w95-blink 1s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 4px;
    }
    /* ── CLI Chat ── */
    .cli-chat {
      position: fixed;
      bottom: 80px;
      left: 40px;
      width: 800px;
      height: 340px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      opacity: 0;
      animation: w95-fadeIn 0.5s ease 2.5s forwards;
      z-index: 5;
    }
    .cli-chat-line {
      font-family: var(--tf);
      font-size: 22px;
      line-height: 1.5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0;
      animation: cli-line-in 0.3s ease forwards;
    }
    .cli-prompt { color: #2ec4b6; }
    .cli-user { font-weight: bold; }
    .cli-msg { color: #888; }
    .cli-sep { color: #444; }
    @keyframes cli-line-in {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Spotify Now Playing ── */
    .cli-spotify {
      position: fixed;
      bottom: 40px;
      right: 40px;
      font-family: var(--tf);
      font-size: 22px;
      color: #555;
      text-align: right;
      opacity: 0;
      animation: w95-fadeIn 0.5s ease 2.5s forwards;
      z-index: 5;
      max-width: 700px;
    }
    .np-label { color: #888; }
    .np-track { color: #7b2d8e; }
    .np-artist { color: #2ec4b6; }
    .np-bar { color: #333; }
    .np-spinner { color: #2ec4b6; }

  </style>
</head>
<body>
  <div class="card-container">
    <div class="logo-blocks"><div></div><div></div><div></div><div></div></div>
    <div class="title-text">WATSONMCROTCH</div>
    <div class="subtitle-text">STREAM ENDED</div>
    <div class="thanks-text">Thanks for watching <span class="cursor-blink"></span></div>
  </div>

  <div class="cli-chat" id="cli-chat"></div>
  <div class="cli-spotify" id="cli-spotify">
    <span class="np-spinner" id="np-spinner">–</span>
    <span class="np-label"> now_playing</span>
    <span class="np-bar"> | </span>
    <span class="np-track" id="np-track"></span>
    <span class="np-bar"> — </span>
    <span class="np-artist" id="np-artist"></span>
  </div>

  <script src="./assets/js/watsonos.js"></script>
  <script>
    /* ── CLI Chat ── */
    var cliChat = document.getElementById('cli-chat');
    var MAX_LINES = 10;

    function getCliColor(username) {
      var hash = 0;
      for (var i = 0; i < username.length; i++) {
        hash = username.charCodeAt(i) + ((hash << 5) - hash);
      }
      return 'hsl(' + (Math.abs(hash) % 360) + ', 60%, 55%)';
    }

    function addChatLine(data) {
      var name = data.displayName || data.username;
      var msg = data.message || '';
      var color = data.userColor || getCliColor(data.username);

      var line = document.createElement('div');
      line.className = 'cli-chat-line';

      var prompt = document.createElement('span');
      prompt.className = 'cli-prompt';
      prompt.textContent = '> ';
      line.appendChild(prompt);

      var user = document.createElement('span');
      user.className = 'cli-user';
      user.style.color = color;
      user.textContent = name;
      line.appendChild(user);

      var sep = document.createElement('span');
      sep.className = 'cli-sep';
      sep.textContent = ' :: ';
      line.appendChild(sep);

      var msgSpan = document.createElement('span');
      msgSpan.className = 'cli-msg';
      msgSpan.textContent = msg;
      line.appendChild(msgSpan);

      cliChat.appendChild(line);
      while (cliChat.children.length > MAX_LINES) {
        cliChat.removeChild(cliChat.firstChild);
      }
    }

    WatsonOS.on('chat-message', function(data) {
      if (data && data.username) addChatLine(data);
    });

    /* ── Spotify Now Playing ── */
    var npTrack = document.getElementById('np-track');
    var npArtist = document.getElementById('np-artist');
    var cliSpotify = document.getElementById('cli-spotify');

    function updateNowPlaying() {
      fetch('http://localhost:7500/spotify_info?_=' + Date.now())
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(data) {
          if (data && data.is_playing && data.track_name) {
            cliSpotify.style.display = 'block';
            npTrack.textContent = data.track_name;
            npArtist.textContent = data.artist_name || '';
          } else {
            cliSpotify.style.display = 'none';
          }
        })
        .catch(function() { cliSpotify.style.display = 'none'; });
    }

    updateNowPlaying();
    setInterval(updateNowPlaying, 5000);

    /* ── Spinner ── */
    var spinChars = ['–', '\\', '|', '/'];
    var spinIdx = 0;
    var npSpinner = document.getElementById('np-spinner');
    setInterval(function() {
      spinIdx = (spinIdx + 1) % spinChars.length;
      npSpinner.textContent = spinChars[spinIdx];
    }, 200);
  </script>
</body>
</html>
