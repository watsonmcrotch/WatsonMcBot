<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WatsonOS Alerts</title>
  <link rel="stylesheet" href="./assets/css/watsonos.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <style>
    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      -webkit-font-smoothing: none;
    }

    #overlay-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
    #overlay-container > * { pointer-events: auto; }

    /* Screen flash */
    .screen-flash {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 9998;
      opacity: 0;
      pointer-events: none;
      animation: flash 0.4s ease-out forwards;
    }
    @keyframes flash {
      0% { opacity: 0.8; }
      100% { opacity: 0; }
    }

    /* Alert avatar */
    .alert-avatar {
      width: 72px;
      height: 72px;
      box-shadow:
        inset -1px -1px 0 #fff,
        inset 1px 1px 0 #808080,
        inset -2px -2px 0 #dfdfdf,
        inset 2px 2px 0 #000;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .alert-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .alert-row { display: flex; align-items: center; gap: 16px; }

    .alert-text {
      font-family: var(--wf);
      font-size: 16px;
      line-height: 1.5;
    }
    .alert-text .username { font-weight: bold; color: var(--win-title); font-size: 18px; }
    .alert-text .sub-info { color: #808080; font-size: 14px; }

    /* Mega cheer */
    .mega-text {
      font-family: var(--tf);
      font-size: 48px;
      color: var(--win-title);
      text-align: center;
      text-shadow: 2px 2px 0 #1084d0, -1px -1px 0 #2ec4b6;
      letter-spacing: 2px;
    }

    /* Raid warning — subtle amber glow, not aggressive red */
    .raid-warning {
      animation: raid-pulse 1.5s ease infinite alternate;
    }
    @keyframes raid-pulse {
      0% { box-shadow:
        inset -1px -1px 0 #000, inset 1px 1px 0 #fff,
        inset -2px -2px 0 #808080, inset 2px 2px 0 #dfdfdf,
        0 0 12px rgba(255,180,0,0.3); }
      100% { box-shadow:
        inset -1px -1px 0 #000, inset 1px 1px 0 #fff,
        inset -2px -2px 0 #808080, inset 2px 2px 0 #dfdfdf,
        0 0 25px rgba(255,180,0,0.5); }
    }

    /* Raid accepted */
    .raid-accepted {
      box-shadow:
        inset -1px -1px 0 #000, inset 1px 1px 0 #fff,
        inset -2px -2px 0 #808080, inset 2px 2px 0 #dfdfdf,
        0 0 20px rgba(0,200,0,0.4) !important;
    }
    .raid-accepted .w95-titlebar {
      background: linear-gradient(90deg, #006600, #00aa00) !important;
    }

    /* Raid full-screen overlay — subtle amber tint, not aggressive red */
    .raid-screen-overlay {
      position: fixed;
      inset: 0;
      z-index: 4999;
      pointer-events: none;
      animation: raid-screen-in 0.5s ease forwards;
    }
    .raid-screen-overlay .raid-scanlines {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 3px,
        rgba(255, 180, 0, 0.02) 3px, rgba(255, 180, 0, 0.02) 6px
      );
    }
    .raid-screen-overlay .raid-vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(255, 140, 0, 0.08) 100%);
      animation: raid-vignette-pulse 2s ease infinite alternate;
    }
    .raid-screen-overlay .raid-border {
      position: absolute;
      inset: 0;
      border: 2px solid rgba(255, 180, 0, 0.3);
      box-shadow: inset 0 0 40px rgba(255, 140, 0, 0.06);
      animation: raid-border-glow 2s ease infinite alternate;
    }
    @keyframes raid-screen-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes raid-vignette-pulse {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }
    @keyframes raid-border-glow {
      0% { border-color: rgba(255, 180, 0, 0.2); box-shadow: inset 0 0 30px rgba(255, 140, 0, 0.04); }
      100% { border-color: rgba(255, 180, 0, 0.45); box-shadow: inset 0 0 50px rgba(255, 140, 0, 0.08); }
    }

    /* Raid accepted screen overlay */
    .raid-screen-accept {
      position: fixed;
      inset: 0;
      z-index: 4999;
      pointer-events: none;
      animation: raid-accept-in 0.5s ease forwards;
    }
    .raid-screen-accept .raid-accept-vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 200, 0, 0.08) 100%);
    }
    .raid-screen-accept .raid-accept-border {
      position: absolute;
      inset: 0;
      border: 2px solid rgba(0, 200, 0, 0.3);
      box-shadow: inset 0 0 40px rgba(0, 200, 0, 0.06);
    }
    @keyframes raid-accept-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* 69-bit spam popups — adult, simple, selling-point front & center */
    .spam-popup { z-index: 5000; }
    .spam-popup .w95-titlebar {
      background: linear-gradient(90deg, #cc0000, #ff6600) !important;
    }
    .spam-popup .w95-body {
      background: #ffff00;
      text-align: center;
      font-family: 'Comic Sans MS', 'Comic Sans', cursive;
      font-weight: bold;
      padding: 16px 12px;
    }
    .spam-headline {
      font-size: 22px;
      color: #cc0000;
      line-height: 1.3;
      margin-bottom: 8px;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.15);
    }
    .spam-cta {
      font-size: 14px;
      color: #0000cc;
      text-decoration: underline;
      cursor: pointer;
    }
    .spam-blink {
      animation: spam-blink-anim 0.5s step-end infinite;
    }
    @keyframes spam-blink-anim {
      0%, 100% { visibility: visible; }
      50% { visibility: hidden; }
    }

    /* File transfer — polished Win95 copy animation */
    .ft-header-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
      padding: 0 4px;
    }
    .ft-header-row .alert-avatar {
      width: 52px;
      height: 52px;
      font-size: 26px;
    }
    .ft-header-text {
      font-family: var(--wf);
      font-size: 14px;
      line-height: 1.5;
    }
    .ft-header-text .username { font-weight: bold; color: var(--win-title); font-size: 15px; }

    .ft-anim-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin: 14px 0 10px;
      position: relative;
      height: 52px;
    }
    .ft-anim-row .ft-folder {
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .ft-anim-row .ft-folder-icon {
      font-size: 36px;
      filter: drop-shadow(1px 1px 0 rgba(0,0,0,0.2));
    }
    .ft-anim-row .ft-folder .alert-avatar {
      width: 48px; height: 48px; font-size: 24px;
    }
    .ft-anim-track {
      flex: 1;
      position: relative;
      height: 52px;
      overflow: visible;
      min-width: 120px;
    }
    .ft-flying-doc {
      position: absolute;
      top: 8px;
      font-size: 28px;
      filter: drop-shadow(1px 2px 1px rgba(0,0,0,0.25));
      animation: ft-doc-fly 1.4s ease-in-out infinite;
      z-index: 2;
    }
    .ft-flying-doc:nth-child(2) { animation-delay: 0.28s; opacity: 0.8; font-size: 22px; top: 0px; }
    .ft-flying-doc:nth-child(3) { animation-delay: 0.56s; opacity: 0.9; font-size: 26px; top: 16px; }
    .ft-flying-doc:nth-child(4) { animation-delay: 0.84s; opacity: 0.7; font-size: 20px; top: 4px; }
    .ft-flying-doc:nth-child(5) { animation-delay: 1.12s; opacity: 0.85; font-size: 24px; top: 12px; }
    @keyframes ft-doc-fly {
      0%   { left: 0; transform: translateY(0) scale(1); opacity: 0; }
      10%  { opacity: 1; transform: translateY(-4px) scale(1.05); }
      50%  { transform: translateY(-12px) scale(1.1); opacity: 1; }
      90%  { opacity: 1; transform: translateY(-4px) scale(1.05); }
      100% { left: calc(100% - 20px); transform: translateY(0) scale(0.9); opacity: 0; }
    }

    .ft-detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--wf);
      font-size: 12px;
      color: #808080;
      margin: 4px 0 2px;
      padding: 0 2px;
    }
    .ft-filename { font-family: var(--wf); font-size: 12px; color: #808080; }
    .ft-speed { font-family: var(--tf); font-size: 11px; color: #808080; }
    .ft-time-remaining {
      font-family: var(--wf);
      font-size: 12px;
      color: #000;
      text-align: center;
      margin-top: 6px;
    }

    /* Gift sub popup */
    .gift-popup .w95-titlebar {
      background: linear-gradient(90deg, #7b2d8e, #ff6600) !important;
    }
    .gift-popup.ft-complete .w95-titlebar {
      background: linear-gradient(90deg, #006600, #00aa00) !important;
    }
    .gift-popup .w95-body {
      padding: 14px 16px 10px;
    }

    /* Shake on appear */
    .alert-shake { animation: w95-shake 0.5s ease; }

    /* ── Fullscreen overlay layer ── */
    #fullscreen-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 3000;
    }
    #fullscreen-layer > * { pointer-events: auto; }

    .video-overlay, .video-display-wrapper, .image-display-wrapper {
      pointer-events: none;
    }
    .video-display, .image-display {
      display: block;
    }

  </style>
</head>
<body>
  <div id="overlay-container"></div>
  <div id="fullscreen-layer"></div>

  <script src="./assets/js/watsonos.js"></script>
  <script>
    WatsonOS.connect();
    var container = document.getElementById('overlay-container');
    var cursor = WatsonOS.createCursor();
    cursor.style.display = 'none';
    document.body.appendChild(cursor);

    /* ── Avatar Helper ──
       decapi.me returns the CDN URL as plain text, NOT an image.
       We must fetch the text first, then set img.src to the CDN URL.
       resolveAvatar returns a Promise that resolves when the image is loaded. */
    var avatarCache = {};

    function resolveAvatar(username, imgEl) {
      if (!username) { imgEl.parentNode.textContent = '\u{1F464}'; return Promise.resolve(); }
      var lower = username.toLowerCase();

      if (avatarCache[lower]) {
        return new Promise(function(resolve) {
          imgEl.onload = resolve;
          imgEl.onerror = function() { this.parentNode.textContent = '\u{1F464}'; resolve(); };
          imgEl.src = avatarCache[lower];
        });
      }

      return fetch('https://decapi.me/twitch/avatar/' + encodeURIComponent(lower))
        .then(function(r) {
          if (!r.ok) throw new Error('not ok');
          return r.text();
        })
        .then(function(url) {
          url = url.trim();
          if (url.indexOf('https://') === 0) {
            avatarCache[lower] = url;
            return new Promise(function(resolve) {
              imgEl.onload = resolve;
              imgEl.onerror = function() { this.parentNode.textContent = '\u{1F464}'; resolve(); };
              imgEl.src = url;
            });
          } else {
            imgEl.parentNode.textContent = '\u{1F464}';
          }
        })
        .catch(function() {
          imgEl.parentNode.textContent = '\u{1F464}';
        });
    }

    /* Returns { el, ready } where ready is a Promise that resolves when the avatar is loaded */
    function createAvatarEl(username) {
      var div = document.createElement('div');
      div.className = 'alert-avatar';
      var img = document.createElement('img');
      img.alt = username || '';
      img.onerror = function() { this.parentNode.textContent = '\u{1F464}'; };
      div.appendChild(img);
      var ready = resolveAvatar(username, img);
      return { el: div, ready: ready };
    }

    /* Wait for all avatar promises with a timeout so we never block forever */
    function waitForAvatars(avatarResults, timeoutMs) {
      var promises = avatarResults.map(function(a) { return a.ready; }).filter(Boolean);
      if (promises.length === 0) return Promise.resolve();
      var timeout = new Promise(function(resolve) { setTimeout(resolve, timeoutMs || 2000); });
      return Promise.race([Promise.all(promises), timeout]);
    }

    /* ── Alert Queue ── */
    var alertQueue = [];
    var alertBusy = false;

    function queueAlert(handler) {
      alertQueue.push(handler);
      processQueue();
    }

    function processQueue() {
      if (alertBusy || alertQueue.length === 0) return;
      alertBusy = true;
      alertQueue.shift()(function() {
        alertBusy = false;
        setTimeout(processQueue, 300);
      });
    }

    function fireImmediate(handler) {
      handler(function() {});
    }

    /* ── Cursor Helpers ── */
    function showCursorOffscreen() {
      var edges = [
        { x: -30, y: WatsonOS.randomInt(200, 880) },
        { x: 1950, y: WatsonOS.randomInt(200, 880) },
        { x: WatsonOS.randomInt(400, 1520), y: -30 },
        { x: WatsonOS.randomInt(400, 1520), y: 1110 },
      ];
      var edge = edges[WatsonOS.randomInt(0, 3)];
      cursor.style.transition = 'none';
      cursor.style.left = edge.x + 'px';
      cursor.style.top = edge.y + 'px';
      cursor.style.display = 'block';
    }

    function hideCursor() { cursor.style.display = 'none'; }

    function centerPos() {
      return {
        x: 660 + WatsonOS.randomInt(-80, 80),
        y: 340 + WatsonOS.randomInt(-60, 60)
      };
    }

    /* ── Progress bar with blocks ── */
    function animateProgressBar(barId, durationMs) {
      var bar = document.getElementById(barId);
      if (!bar) return;
      while (bar.firstChild) bar.removeChild(bar.firstChild);
      var containerWidth = bar.parentElement.clientWidth - 4;
      var blockWidth = 14;
      var totalBlocks = Math.floor(containerWidth / blockWidth);
      var interval = durationMs / totalBlocks;
      var count = 0;
      var timer = setInterval(function() {
        if (count >= totalBlocks) { clearInterval(timer); return; }
        var block = document.createElement('div');
        block.className = 'progress-block';
        bar.appendChild(block);
        count++;
      }, interval);
    }

    /* Cursor navigation */
    function moveCursorToButton(btn, speed) {
      if (!btn) return Promise.resolve();
      var r = btn.getBoundingClientRect();
      var tx = r.left + r.width / 2 - 5;
      var ty = r.top + r.height / 2 - 2;
      return new Promise(function(resolve) {
        WatsonOS.moveCursorNatural(cursor, tx, ty, speed || 400, resolve);
      });
    }

    /* Standard flow: show popup, cursor enters, moves to button, clicks, dismisses */
    async function standardAlert(win, btnId, waitMs, cursorSpeed, done) {
      WatsonOS.showWindow(win, container);
      showCursorOffscreen();

      await WatsonOS.delay(waitMs);

      var btn = document.getElementById(btnId);
      if (btn) {
        await moveCursorToButton(btn, cursorSpeed || 400);
        WatsonOS.clickButton(btn);
        await WatsonOS.delay(150);
        WatsonOS.dismissWindow(win, function() { hideCursor(); if (done) done(); });
      } else {
        WatsonOS.dismissWindow(win, function() { hideCursor(); if (done) done(); });
      }
    }

    /* ════════════ FOLLOW ════════════ */
    WatsonOS.on('watsonos_follow', function(data) {
      queueAlert(async function(done) {
        var username = data.username || 'Someone';
        var displayName = data.display_name || username;
        var pos = centerPos();
        var btnId = 'follow-ok-' + Date.now();

        var avatar = createAvatarEl(username);

        var bodyEl = document.createElement('div');
        bodyEl.className = 'alert-row';
        bodyEl.appendChild(avatar.el);
        var textDiv = document.createElement('div');
        textDiv.className = 'alert-text';
        var nameSpan = document.createElement('span');
        nameSpan.className = 'username';
        nameSpan.textContent = displayName;
        textDiv.appendChild(nameSpan);
        textDiv.appendChild(document.createTextNode(' just followed!'));
        textDiv.appendChild(document.createElement('br'));
        textDiv.appendChild(document.createTextNode('Thank you!'));
        textDiv.appendChild(document.createElement('br'));
        var subInfo = document.createElement('span');
        subInfo.className = 'sub-info';
        subInfo.textContent = displayName + ' has been added to the registry.';
        textDiv.appendChild(subInfo);
        bodyEl.appendChild(textDiv);

        await waitForAvatars([avatar]);

        var win = WatsonOS.createWindow({
          title: 'New Follower Detected',
          icon: '\uD83D\uDCCB',
          width: 480,
          x: pos.x, y: pos.y,
          bodyContent: bodyEl,
          buttons: [{ label: 'OK', id: btnId }],
          id: 'follow-' + Date.now()
        });

        WatsonOS.playSound('./assets/sounds/follower.mp3');
        standardAlert(win, btnId, 3000, 900, done);
      });
    });

    /* ════════════ BITS ════════════ */
    WatsonOS.on('watsonos_bits', function(data) {
      var bits = parseInt(data.bits) || 0;
      var username = data.username || 'Someone';
      var displayName = data.display_name || username;

      /* 69 bits — SPAM MODE — adult, simple, selling-point front & centre */
      if (bits === 69) {
        fireImmediate(async function(done) {
          var ads = [
            { headline: 'HOT SINGLES IN YOUR AREA', sub: 'Click here to meet them tonight!' },
            { headline: 'ENLARGE YOUR PENIS TODAY', sub: 'Doctors don\'t want you to know this!' },
            { headline: 'CONGRATULATIONS! YOU WON A FREE iPHONE!', sub: 'Claim your prize now before it expires!' },
            { headline: 'YOU ARE THE 1,000,000th VISITOR!', sub: 'Click to claim your $10,000 cash prize!' },
            { headline: 'MILFS IN YOUR NEIGHBOURHOOD', sub: 'No signup required. Browse now!' },
            { headline: 'YOUR COMPUTER HAS 69 VIRUSES!', sub: 'Download WatsonAntiVirus NOW!' },
            { headline: 'ONE WEIRD TRICK TO LAST LONGER', sub: 'She\'ll thank you later...' },
            { headline: 'MAKE $5,000/DAY FROM HOME', sub: 'This secret method THEY don\'t want you to see' },
            { headline: 'FREE VIAGRA SAMPLES', sub: 'No prescription needed! Limited time offer!' },
            { headline: 'LONELY TONIGHT?', sub: 'Local singles are waiting for you right now!' },
            { headline: 'GROW 3 INCHES IN 3 WEEKS', sub: 'The #1 method recommended by adult stars' },
            { headline: 'YOUR WIFE DOESN\'T NEED TO KNOW', sub: 'Discreet encounters. Sign up free.' }
          ];
          var spamCount = WatsonOS.randomInt(8, 14);
          var popups = [];
          setTimeout(function() { WatsonOS.playSound('./assets/sounds/nice.mp3'); }, 500);

          /* Shuffle ads so we don't repeat */
          var shuffled = ads.slice();
          for (var s = shuffled.length - 1; s > 0; s--) {
            var r = Math.floor(Math.random() * (s + 1));
            var tmp = shuffled[s]; shuffled[s] = shuffled[r]; shuffled[r] = tmp;
          }

          var spamSchemes = [
            { bg: '#ffff00', text: '#cc0000', bar: 'linear-gradient(90deg,#cc0000,#ff6600)' },
            { bg: '#ff66cc', text: '#ffffff', bar: 'linear-gradient(90deg,#cc0066,#ff3399)' },
            { bg: '#00ff00', text: '#000000', bar: 'linear-gradient(90deg,#006600,#00cc00)' },
            { bg: '#ff6600', text: '#ffffff', bar: 'linear-gradient(90deg,#cc3300,#ff9900)' },
            { bg: '#00ffff', text: '#cc0000', bar: 'linear-gradient(90deg,#0066cc,#00cccc)' },
            { bg: '#ffffff', text: '#cc0000', bar: 'linear-gradient(90deg,#cc0000,#ff0000)' },
            { bg: '#ffccff', text: '#660066', bar: 'linear-gradient(90deg,#990099,#cc00cc)' },
          ];

          for (var i = 0; i < spamCount; i++) {
            await WatsonOS.delay(WatsonOS.randomInt(80, 250));
            var ad = shuffled[i % shuffled.length];
            var scheme = spamSchemes[i % spamSchemes.length];
            var popupW = WatsonOS.randomInt(300, 420);

            var bodyDiv = document.createElement('div');
            bodyDiv.style.background = scheme.bg;
            var headlineDiv = document.createElement('div');
            headlineDiv.className = 'spam-headline';
            headlineDiv.style.color = scheme.text;
            headlineDiv.textContent = ad.headline;
            var ctaDiv = document.createElement('div');
            ctaDiv.className = 'spam-cta spam-blink';
            ctaDiv.textContent = ad.sub;
            bodyDiv.appendChild(headlineDiv);
            bodyDiv.appendChild(ctaDiv);

            var win = WatsonOS.createWindow({
              title: ad.headline,
              width: popupW,
              x: WatsonOS.randomInt(50, 1920 - popupW - 50),
              y: WatsonOS.randomInt(30, 750),
              bodyContent: bodyDiv,
              buttons: [{ label: 'CLOSE', id: 'spam-btn-' + i + '-' + Date.now() }],
              className: 'spam-popup',
              id: 'spam-' + i + '-' + Date.now()
            });
            var titlebar = win.querySelector('.w95-titlebar');
            if (titlebar) titlebar.style.background = scheme.bar;
            WatsonOS.showWindow(win, container, './assets/sounds/spam.mp3');
            popups.push(win);
          }

          await WatsonOS.delay(5000);
          showCursorOffscreen();
          await WatsonOS.delay(200);

          for (var j = 0; j < popups.length; j++) {
            var popup = popups[j];
            if (!popup.parentNode) continue;
            var btn = popup.querySelector('.w95-title-btn');
            if (btn) {
              await moveCursorToButton(btn, 150);
              WatsonOS.clickButton(btn);
              await WatsonOS.delay(120);
              WatsonOS.dismissWindow(popup);
            }
          }
          hideCursor();
          done();
        });
        return;
      }

      /* 1000+ bits — BSOD then big hype cheer */
      if (bits >= 1000) {
        queueAlert(async function(done) {
          WatsonOS.playSound('./assets/sounds/error.mp3');
          var bsod = document.createElement('div');
          bsod.className = 'w95-bsod';

          var header = document.createElement('div');
          header.className = 'w95-bsod-header';
          header.textContent = 'WatsonOS';

          var text = document.createElement('div');
          text.className = 'w95-bsod-text';
          var lines = [
            'A fatal exception CHEER_OVERFLOW has occurred at 0x' +
              bits.toString(16).toUpperCase().padStart(8, '0') +
              '. The current application will be terminated.',
            '',
            '*  Press any key to acknowledge the generous donation from ' + displayName + '.',
            '*  Press CTRL+ALT+DEL to restart your computer. You will',
            '   lose any unsaved information in all applications.'
          ];
          lines.forEach(function(line, i) {
            if (i > 0) text.appendChild(document.createElement('br'));
            text.appendChild(document.createTextNode(line));
          });

          var footer = document.createElement('div');
          footer.className = 'w95-bsod-footer';
          footer.textContent = 'Press any key to continue _';

          bsod.appendChild(header);
          bsod.appendChild(text);
          bsod.appendChild(footer);
          container.appendChild(bsod);

          await WatsonOS.delay(4000);
          bsod.style.transition = 'opacity 0.3s';
          bsod.style.opacity = '0';

      var gifterLogin = data.gifter_login || gifter;
      var recipientLogin = data.recipient_login || recipient;

      /* Build polished Win95 file-copy transfer body */
      function buildTransferBody(gifterName, gifterUser, recipientName, recipientUser, subNum, subTotal) {
        var body = document.createElement('div');
        var avatars = [];

        /* Header text describing the transfer */

        } else {
          headerText.appendChild(document.createTextNode(' is gifting a subscription'));
        }
        body.appendChild(headerText);

        /* Animated transfer row: gifter avatar -> flying presents -> recipient avatar */
        var animRow = document.createElement('div');

          track.appendChild(gift);
        }
        animRow.appendChild(track);

        var destSide = document.createElement('div');
        destSide.className = 'ft-folder';
        if (recipientUser) {
          var rAvatar = createAvatarEl(recipientUser);
          avatars.push(rAvatar);
          destSide.appendChild(rAvatar.el);
        } else {
          var destIcon = document.createElement('span');
          destIcon.className = 'ft-folder-icon';
          destIcon.textContent = '\uD83C\uDF81';
          destSide.appendChild(destIcon);
        }
        animRow.appendChild(destSide);
        body.appendChild(animRow);

        /* File detail row */
        var detailRow = document.createElement('div');
        detailRow.className = 'ft-detail-row';
        var fileLabel = document.createElement('span');
        fileLabel.className = 'ft-filename';
        fileLabel.textContent = recipientName

          : 'gift_sub_' + subNum + '.exe';
        detailRow.appendChild(fileLabel);
        var speedLabel = document.createElement('span');
        speedLabel.className = 'ft-speed';
        var fakeBps = WatsonOS.randomInt(28, 56);
        speedLabel.textContent = fakeBps + '.' + WatsonOS.randomInt(1,9) + ' KB/s';
        detailRow.appendChild(speedLabel);
        body.appendChild(detailRow);

        /* Progress bar */
        var barId = 'ft-bar-' + subNum + '-' + Date.now();
        var progressWrap = document.createElement('div');
        progressWrap.style.margin = '6px 0 4px';
        var progressOuter = document.createElement('div');

        body.appendChild(timeLabel);

        return { body: body, barId: barId, avatars: avatars, timeLabel: timeLabel };

      if (totalSubs >= 5) {
        fireImmediate(async function(done) {
          WatsonOS.playSound('./assets/sounds/giftsub_mass.mp3');

          await WatsonOS.delay(4500);

            if (p.win.parentNode) p.win.className = p.win.className + ' ft-complete';

          }

          await WatsonOS.delay(1500);
          showCursorOffscreen();
          await WatsonOS.delay(200);

          for (var j = 0; j < popups.length; j++) {
            var popup = popups[j].win;
            if (!popup.parentNode) continue;
            var btn = popup.querySelector('.w95-title-btn');
            if (btn) {
              await moveCursorToButton(btn, 120);
              WatsonOS.clickButton(btn);
              await WatsonOS.delay(100);
              WatsonOS.dismissWindow(popup);
            }
          }
          hideCursor();
          done();
        });
        return;
      }

      /* 1-4 gifts — single file transfer window with both avatars */
      queueAlert(async function(done) {
        WatsonOS.playSound('./assets/sounds/giftsub.mp3');
        var pos = centerPos();
        var btnId = 'ft-ok-' + Date.now();

        var ft = buildTransferBody(gifter, gifterLogin, recipient, recipientLogin, 1, totalSubs);

        var win = WatsonOS.createWindow({
          title: 'Copying... Gift Subscription', icon: '\uD83D\uDCC1',
          width: 500,

          buttons: [{ label: 'OK', id: btnId }],
          className: 'gift-popup',
          id: 'giftsub-' + Date.now()
        });

        WatsonOS.showWindow(win, container);
        showCursorOffscreen();

        await WatsonOS.delay(100);
        animateProgressBar(ft.barId, 2500);

        /* Countdown the time-remaining label */
        var countdown = 3;
        var cdTimer = setInterval(function() {
          countdown--;
          if (countdown <= 0) {
            clearInterval(cdTimer);
            ft.timeLabel.textContent = 'Transfer Complete!';
            ft.timeLabel.style.color = '#006600';
            ft.timeLabel.style.fontWeight = 'bold';
            win.className = win.className + ' ft-complete';
            var tEl = win.querySelector('.w95-title-text');
            if (tEl) tEl.textContent = '\u2705 Gift Subscription \u2014 Complete';
          } else {
            ft.timeLabel.textContent = 'Time remaining: About ' + countdown + ' second' + (countdown > 1 ? 's' : '');
          }
        }, 1000);

        await WatsonOS.delay(4000);

        var btn = document.getElementById(btnId);
        if (btn) {
          await moveCursorToButton(btn, 400);
          WatsonOS.clickButton(btn);
          await WatsonOS.delay(150);
          WatsonOS.dismissWindow(win, function() { hideCursor(); done(); });
        } else {
          WatsonOS.dismissWindow(win, function() { hideCursor(); done(); });
        }
      });

    /* ═══════════════════════════════════════════════════════════
       FULLSCREEN OVERLAY SYSTEM
       Handles show-video, show-image, text-overlay, custom_video
       events — previously in fullscreen_overlay.html
       ═══════════════════════════════════════════════════════════ */
    var fsLayer = document.getElementById('fullscreen-layer');
    var FLASK_SERVER = 'http://localhost:5555';
    var MAX_CONCURRENT_VIDEOS = 5;

    function getNormalizedPath(url) {
      if (url.indexOf('http://') === 0 || url.indexOf('https://') === 0 || url.indexOf('/') === 0) return url;
      if (url.indexOf('file:///') === 0) return url;
      return url.indexOf('localhost') === 0 ? 'http://' + url : url;
    }

    function getVideoPosition(data) {
      if (!data.position) {
        return { position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)' };
      }
      return data.position;
    }

    function fadeOutOverlay(element, data) {
      var videos = element.querySelectorAll('video');
      for (var i = 0; i < videos.length; i++) {
        try { videos[i].pause(); videos[i].loop = false; } catch (e) {}
      }

      if (data.animateOut) {
        if (data.animateIn) element.classList.remove('animate__' + data.animateIn);
        element.classList.add('animate__' + data.animateOut);
        var removeTimeout = setTimeout(function() { if (element.parentNode) element.remove(); }, 1500);
        element.addEventListener('animationend', function() {
          clearTimeout(removeTimeout);
          if (element.parentNode) element.remove();
        });
      } else {
        element.style.transition = 'opacity 0.5s ease-out';
        element.style.opacity = '0';
        setTimeout(function() { if (element.parentNode) element.remove(); }, 500);
      }
    }

    /* ── custom_video ── */
    WatsonOS.on('custom_video', function(data) {
      var activeVideos = fsLayer.querySelectorAll('.video-overlay');
      if (activeVideos.length >= MAX_CONCURRENT_VIDEOS) {
        if (activeVideos[0] && activeVideos[0].parentNode) activeVideos[0].remove();
      }

      var wrapper = document.createElement('div');
      wrapper.className = 'video-overlay video-overlay-custom_video animate__animated';
      if (data.animateIn) wrapper.classList.add('animate__' + data.animateIn);

      var pos = getVideoPosition(data);
      for (var p in pos) wrapper.style[p] = pos[p];

      var video = document.createElement('video');
      video.className = 'custom-video custom_video';
      video.src = getNormalizedPath(data.video_path);
      video.autoplay = true;
      video.playsInline = true;
      video.loop = false;
      video.muted = data.muted || false;
      video.controls = false;
      video.volume = typeof data.volume === 'number' ? data.volume : (typeof data.volume === 'string' ? parseFloat(data.volume) : 1.0);
      if (data.width) video.style.width = data.width;
      if (data.height) video.style.height = data.height;

      wrapper.appendChild(video);
      fsLayer.appendChild(wrapper);

      var dur = data.duration || 10000;
      setTimeout(function() {
        if (wrapper.parentNode) fadeOutOverlay(wrapper, data);
      }, dur);
    });

    /* ── show-video ── */
    WatsonOS.on('show-video', function(data) {
      var existing = fsLayer.querySelectorAll('.video-display-wrapper');
      for (var i = 0; i < existing.length; i++) existing[i].remove();

      var wrapper = document.createElement('div');
      wrapper.className = 'video-display-wrapper';
      if (data.animateIn) wrapper.classList.add('animate__animated', 'animate__' + data.animateIn);
      if (data.style) {
        for (var s in data.style) wrapper.style[s] = data.style[s];
      }

      var video = document.createElement('video');
      video.className = 'video-display';
      video.src = getNormalizedPath(data.url);
      video.autoplay = true;
      video.loop = false;
      video.muted = true;
      video.playsInline = true;
      video.controls = false;
      video.style.cssText = 'width:100%;height:100%;object-fit:contain;display:block';

      video.addEventListener('loadeddata', function() {
        setTimeout(function() {
          try {
            video.muted = false;
            video.volume = typeof data.volume === 'number' ? data.volume : 0.5;
          } catch (e) {}
        }, 1000);
      });

      wrapper.appendChild(video);
      fsLayer.appendChild(wrapper);

      setTimeout(function() { try { video.play(); } catch (e) {} }, 100);

      var dur = data.duration || 10000;
      setTimeout(function() {
        if (wrapper.parentNode) fadeOutOverlay(wrapper, data);
      }, dur);
    });

    /* ── show-image ── */
    WatsonOS.on('show-image', function(data) {
      var existing = fsLayer.querySelectorAll('.image-display-wrapper');
      for (var i = 0; i < existing.length; i++) existing[i].remove();

      var wrapper = document.createElement('div');
      wrapper.className = 'image-display-wrapper animate__animated';
      if (data.animateIn) wrapper.classList.add('animate__' + data.animateIn);
      if (data.style) {
        if (data.style.position) wrapper.style.position = data.style.position;
        if (data.style.top) wrapper.style.top = data.style.top;
        if (data.style.left) wrapper.style.left = data.style.left;
      }

      var img = document.createElement('img');
      img.className = 'image-display';
      img.src = FLASK_SERVER + data.url;
      if (data.style) {
        if (data.style.width) img.style.width = data.style.width;
        if (data.style.height) img.style.height = data.style.height;
        if (data.style.borderRadius) img.style.borderRadius = data.style.borderRadius;
      }
      img.onload = function() { wrapper.style.visibility = 'visible'; };

      wrapper.appendChild(img);
      fsLayer.appendChild(wrapper);

      if (data.duration) {
        setTimeout(function() {
          if (data.animateOut) {
            if (data.animateIn) wrapper.classList.remove('animate__' + data.animateIn);
            wrapper.classList.add('animate__' + data.animateOut);
            wrapper.addEventListener('animationend', function() { wrapper.remove(); });
          } else {
            wrapper.style.opacity = '0';
            setTimeout(function() { wrapper.remove(); }, 500);
          }
        }, data.duration);
      }
    });

    /* ── text-overlay ── */
    WatsonOS.on('text-overlay', function(data) {
      var el = document.createElement('div');
      el.className = 'animate__animated';
      if (data.animateIn) el.classList.add('animate__' + data.animateIn);
      el.textContent = data.content || '';
      if (data.style) { for (var s in data.style) el.style[s] = data.style[s]; }
      if (data.position) { for (var p in data.position) el.style[p] = data.position[p]; }

      fsLayer.appendChild(el);

      if (data.duration) {
        setTimeout(function() {
          if (data.animateOut) {
            if (data.animateIn) el.classList.remove('animate__' + data.animateIn);
            el.classList.add('animate__' + data.animateOut);
            el.addEventListener('animationend', function() { el.remove(); });
          } else {
            el.style.opacity = '0';
            setTimeout(function() { el.remove(); }, 500);
          }
        }, data.duration);
      }
    });
  </script>
</body>
</html>
