<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WatsonOS Desktop — Fullscreen</title>
  <link rel="stylesheet" href="./assets/css/watsonos.css">
  <style>
    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--win-bg);
    }

    .desktop {
      position: fixed;
      inset: 0;
      background:
        repeating-linear-gradient(
          0deg,
          transparent 0px, transparent 3px,
          rgba(0,0,0,0.02) 3px, rgba(0,0,0,0.02) 4px
        );
    }

    .taskbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 28px;
      background: var(--win-gray);
      box-shadow:
        inset 0 1px 0 #fff,
        inset 0 -1px 0 #000;
      display: flex;
      align-items: center;
      padding: 2px 4px;
      gap: 4px;
      z-index: 10;
      font-family: var(--wf);
      font-size: 11px;
    }

    .start-btn {
      height: 22px;
      padding: 2px 8px;
      background: var(--win-gray);
      border: none;
      box-shadow:
        inset -1px -1px 0 #000,
        inset 1px 1px 0 #fff,
        inset -2px -2px 0 #808080,
        inset 2px 2px 0 #dfdfdf;
      font-family: var(--wf);
      font-size: 11px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: default;
    }

    .start-logo {
      width: 16px;
      height: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
    }
    .start-logo div:nth-child(1) { background: #7b2d8e; }
    .start-logo div:nth-child(2) { background: #2ec4b6; }
    .start-logo div:nth-child(3) { background: #2ec4b6; }
    .start-logo div:nth-child(4) { background: #7b2d8e; }

    .taskbar-divider {
      width: 2px;
      height: 20px;
      box-shadow: -1px 0 0 #808080, 1px 0 0 #fff;
      margin: 0 2px;
    }

    .taskbar-task {
      height: 22px;
      padding: 2px 10px;
      background: var(--win-gray);
      border: none;
      box-shadow:
        inset -1px -1px 0 #000,
        inset 1px 1px 0 #fff,
        inset -2px -2px 0 #808080,
        inset 2px 2px 0 #dfdfdf;
      font-family: var(--wf);
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .taskbar-tray {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 8px;
      height: 22px;
      box-shadow:
        inset -1px -1px 0 #fff,
        inset 1px 1px 0 #808080;
      font-size: 10px;
      color: var(--win-text);
    }
  </style>
</head>
<body>
  <div class="desktop"></div>
  <div class="taskbar">
    <button class="start-btn">
      <div class="start-logo"><div></div><div></div><div></div><div></div></div>
      Start
    </button>
    <div class="taskbar-divider"></div>
    <div class="taskbar-task">📹 camera.exe — Fullscreen</div>
    <div class="taskbar-task">💬 chat.exe</div>
    <div class="taskbar-task">📊 stats.exe</div>
    <div class="taskbar-task" id="task-spotify">🎵 media_player.exe</div>
    <div class="taskbar-tray">
      <span id="tray-clock"></span>
    </div>
  </div>


  <script>
    function updateClock() {
      const now = new Date();
      const h = now.getHours().toString().padStart(2, '0');
      const m = now.getMinutes().toString().padStart(2, '0');
      document.getElementById('tray-clock').textContent = h + ':' + m;
    }
    updateClock();
    setInterval(updateClock, 30000);

    function checkSpotify() {
      fetch('http://localhost:7500/spotify_info?_=' + Date.now())
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(data) {
          var el = document.getElementById('task-spotify');
          if (data && data.is_playing) {
            el.style.display = 'flex';
          } else {
            el.style.display = 'none';
          }
        })
        .catch(function() {
          document.getElementById('task-spotify').style.display = 'none';
        });
    }
    checkSpotify();
    setInterval(checkSpotify, 5000);
  </script>
</body>
</html>
