<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Overlay</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: transparent;
            color: white;
            margin: 0;
            padding: 0;
            width: 750px;
            height: 170px;

        }

        .overlay-container {
            display: flex;
            justify-content: space-between;
            width: 100%;

            padding: 10px 11px 10px 18px;
            align-items: center;
            box-sizing: border-box;

        .text-container {

        .scroll-text {
            display: inline-block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-name {
            font-family: 'Segoe UI Semibold', sans-serif;
            font-size: 30
            px;
            margin: 0;
            text-shadow: 2px 2px 4px black;
            line-height: 1.5;
            display: block;
        }

        .artist-name {
            font-family: 'Segoe UI', sans-serif;
            font-size: 22px;
            margin: 4px 1px 0 0;
            text-shadow: 2px 2px 4px black;
            line-height: 1.5;
            display: block;
        }

        .album-name {
            font-family: 'Segoe UI', sans-serif;
            font-size: 18px;
            margin: 6px 0 0 0;
            text-shadow: 2px 2px 4px black;
            line-height: 1.5;
            display: block;
            margin-bottom: 10px;
        }

        #album-art {
            border-radius: 12pt;
            width: 150px;
            height: 150px;
            object-fit: cover;
        }

        .timer-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .progress-bar-container {
            width: 480px;
            height: 8px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0;
            background-color: #926DC0;
            transition: width 1s linear;
        }

        .timer {
            font-family: 'Segoe UI', sans-serif;

            line-height: 1.5;
            display: block;

            display: flex;

            align-items: center;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="overlay-container">
        <div class="text-container">
            <span id="track-name" class="track-name scroll-text">Loading track...</span>
            <span id="artist-name" class="artist-name scroll-text">Loading artist...</span>
            <span id="album-name" class="album-name scroll-text">Loading album...</span>

            <div class="timer-container">
                <div class="progress-bar-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <span id="timer" class="timer">--:-- / --:--</span>
            </div>
        </div>
        <div class="right-content">
            <img id="album-art" src="" alt="Album Art" />
        </div>
    </div>

    <script>
        let lastAlbumArt = "";
        let progressMs = 0;
        let durationMs = 0;
        let isPlaying = false;
        let elapsedTime = 0;
        let lastTrackId = null;

        function formatTime(ms) {
            if (!ms || ms === 0 || isNaN(ms)) return "--:--";
            const minutes = Math.floor(ms / 60000);
            const seconds = ((ms % 60000) / 1000).toFixed(0);
            return minutes + ":" + (seconds < 10 ? "0" : "") + seconds;
        }

        function updateTimer() {
            if (isPlaying && elapsedTime < durationMs) {
                elapsedTime += 1000;
                const currentTime = formatTime(elapsedTime);
                const totalTime = formatTime(durationMs);
                document.getElementById('timer').textContent = `${currentTime} / ${totalTime}`;

                const progressPercent = (elapsedTime / durationMs) * 100;
                document.getElementById('progress-bar').style.width = `${progressPercent}%`;
            } else if (!isPlaying) {
                const currentTime = formatTime(elapsedTime);
                const totalTime = formatTime(durationMs);
                document.getElementById('timer').textContent = `${currentTime} / ${totalTime}`;
            }
        }

        async function fetchSpotifyData() {
            try {
                const response = await fetch('http://localhost:7500/spotify_info');

                if (!response.ok) {
                    document.getElementById('track-name').textContent = "No track playing";
                    document.getElementById('artist-name').textContent = "";
                    document.getElementById('album-name').textContent = "";
                    document.getElementById('album-art').style.display = "none";
                    document.getElementById('progress-bar').style.width = '0%';
                    document.getElementById('timer').textContent = "--:-- / --:--";
                    document.querySelector('.progress-bar-container').style.display = "none";
                    document.querySelector('#timer').style.display = "none";
                    document.querySelector('.overlay-container').style.display = 'none';
                    return;
                }

                const data = await response.json();
                
                if (Object.keys(data).length === 0) {
                    document.querySelector('.overlay-container').style.display = 'none';
                    return;
                }

                document.querySelector('.overlay-container').style.display = 'flex';
                document.getElementById('track-name').textContent = data.track_name;
                document.getElementById('artist-name').textContent = data.artist_name;
                document.getElementById('album-name').textContent = data.album_name;

                if (data.album_art_url !== lastAlbumArt) {
                    lastAlbumArt = data.album_art_url;
                    document.getElementById('album-art').src = lastAlbumArt;
                    document.getElementById('album-art').style.display = "block";
                }

                if (data.is_playing) {
                    if (durationMs !== data.duration_ms) {
                        durationMs = data.duration_ms;
                        elapsedTime = data.progress_ms;
                    }
                    isPlaying = true;
                    document.querySelector('.progress-bar-container').style.display = "block";
                    document.querySelector('#timer').style.display = "block";
                } else {
                    isPlaying = false;
                    document.querySelector('.progress-bar-container').style.display = "none";
                    document.querySelector('#timer').style.display = "none";
                }

                const currentTime = formatTime(elapsedTime);
                const totalTime = formatTime(durationMs);
                document.getElementById('timer').textContent = `${currentTime} / ${totalTime}`;

                const progressPercent = (elapsedTime / durationMs) * 100;
                document.getElementById('progress-bar').style.width = `${progressPercent}%`;

            } catch (error) {
                console.error("Error fetching Spotify data: ", error);
                document.querySelector('.overlay-container').style.display = 'none';
            }
        }

        setInterval(fetchSpotifyData, 2000);
        setInterval(updateTimer, 1000);
        fetchSpotifyData();
    </script>
</body>
</html>
